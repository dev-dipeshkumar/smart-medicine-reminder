<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="pill-clip">
      <rect x="4" y="20" width="56" height="24" rx="12" ry="12" transform="rotate(-45 32 32)"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1E1B4B"/>
  <!-- Pill shape - left half (indigo) -->
  <rect x="4" y="20" width="56" height="24" rx="12" ry="12" transform="rotate(-45 32 32)" fill="#4F46E5"/>
  <!-- Pill shape - right half (white) -->
  <rect x="32" y="4" width="28" height="56" fill="#F8FAFC" clip-path="url(#pill-clip)"/>
  <!-- Dividing line -->
  <line x1="10" y1="54" x2="54" y2="10" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
</svg>
