<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark navy background -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>
  <!-- Teal-to-indigo pill shape -->
  <defs>
    <linearGradient id="pillGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Pill capsule centered -->
  <g transform="translate(256,256) rotate(-45)">
    <!-- Left half (teal) -->
    <rect x="-148" y="-64" width="148" height="128" rx="0" fill="#14b8a6"/>
    <ellipse cx="-148" cy="0" rx="64" ry="64" fill="#14b8a6"/>
    <!-- Right half (indigo) -->
    <rect x="0" y="-64" width="148" height="128" rx="0" fill="#6366f1"/>
    <ellipse cx="148" cy="0" rx="64" ry="64" fill="#6366f1"/>
    <!-- Dividing line -->
    <line x1="0" y1="-64" x2="0" y2="64" stroke="#0f172a" stroke-width="8" opacity="0.6"/>
  </g>
</svg>
